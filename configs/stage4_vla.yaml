# ============================================================
# Stage 4 配置: SmolVLA + 触觉融合训练
# ============================================================
# 旧版 (TactileVLAAdapter) 字段保留向后兼容

seed: 42
window_T: 16
target_fps: 10
batch_size: 4
epochs: 40
action_dim: 6
state_dim: 6
amp: true

# --- SmolVLA 相关 ---
pretrained: "lerobot/smolvla_base"
chunk_size: 50
n_tactile_tokens: 8
tokenizer_max_length: 48

# --- 学习率 (分组) ---
lr_expert: 1e-4
lr_tactile_proj: 5e-4
lr_tactile_encoder: 1e-5
lr_state_proj: 1e-4
weight_decay: 0.0000000001
grad_clip_norm: 10.0

# --- 触觉编码器 ---
freeze_tactile: true

# --- 向后兼容旧版字段 ---
fps: 10.0
lr_tactile: 1e-4
lr_adapter: 5e-4
lr_lora: 1e-4
use_dummy_vla: false
save_every: 5
