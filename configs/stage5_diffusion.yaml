# ============================================================
# Stage 5 配置: Diffusion Policy + Tactile
# ============================================================

seed: 42
window_T: 16
target_fps: 10
batch_size: 64
epochs: 100
action_dim: 6
state_dim: 6
amp: true

# --- Diffusion Policy 特有 ---
n_obs_steps: 2
horizon: 16
n_action_steps: 8
num_train_timesteps: 100
vision_backbone: "resnet18"

# --- 学习率 ---
lr: 1e-4
weight_decay: 0.000001
grad_clip_norm: 10.0

# --- 触觉编码器 ---
freeze_tactile: true

save_every: 10
