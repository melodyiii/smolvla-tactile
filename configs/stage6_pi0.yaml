# ============================================================
# Stage 6 配置: Pi0 / Pi0-FAST + Tactile
# ============================================================

seed: 42
window_T: 16
target_fps: 10
batch_size: 2
epochs: 40
action_dim: 6
state_dim: 6
amp: true

# --- Pi0 特有 ---
chunk_size: 50
n_tactile_tokens: 8
tokenizer_max_length: 48

# --- 学习率 (分组) ---
lr_expert: 1e-4
lr_tactile_proj: 5e-4
lr_tactile_encoder: 1e-5
lr_state_proj: 1e-4
weight_decay: 0.0000000001
grad_clip_norm: 10.0

# --- 触觉编码器 ---
freeze_tactile: true

save_every: 5
